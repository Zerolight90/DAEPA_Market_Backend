version: '3.8'

services:
  backend:
    image: zerolightdev/daepa-backend:latest
    container_name: daepa-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # DB_HOST를 .env에서 읽어오도록 설정
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    networks:
      - daepa-network

networks:
  daepa-network:
    driver: bridge