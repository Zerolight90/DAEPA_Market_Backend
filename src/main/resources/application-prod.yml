spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update # 운영 안정화 후에는 validate 권장
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-northeast-2}
      s3:
        bucket: ${AWS_S3_BUCKET}

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: "https://daepamarket.shop/api/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope: [name, email, mobile, nickname, gender, birthday, birthyear, profile_image]
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "https://daepamarket.shop/api/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: [profile_nickname, account_email]
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.daepamarket: INFO # 프로젝트 패키지명에 맞게 수정
  file:
    name: /var/log/daepa-market/backend.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

custom:
  cors:
    allowed-origins: ${CUSTOM_CORS_ALLOWED_ORIGINS:https://daepamarket.shop,https://www.daepamarket.shop}

app:  
  jwt:
    secret: ${JWT_SECRET}
    issuer: daepa-market
    access-exp-min: ${JWT_ACCESS_EXP_MIN:600}
    refresh-exp-days: ${JWT_REFRESH_EXP_DAYS:14}
  front-url: "https://daepamarket.shop"
  cookie:
    # ✅ .daepamarket.shop 으로 설정해야 api와 www 사이에서 쿠키가 공유됩니다.
    domain: ".daepamarket.shop"
    secure: true
    samesite: None